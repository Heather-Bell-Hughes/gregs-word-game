name: Smoke Test

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

jobs:
  smoke-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Check if site is accessible
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://heather-bell-hughes.github.io/gregs-word-game/)
          if [ "$response" != "200" ]; then
            echo "Site returned HTTP $response"
            exit 1
          fi
          echo "Site is accessible (HTTP $response)"

      - name: Verify page loads with React
        run: |
          page_content=$(curl -s https://heather-bell-hughes.github.io/gregs-word-game/)
          if echo "$page_content" | grep -q "root"; then
            echo "✓ React root element found"
          else
            echo "✗ React root element not found"
            exit 1
          fi
          if echo "$page_content" | grep -q "type=.*module"; then
            echo "✓ Module script found"
          else
            echo "✗ Module script not found"
            exit 1
          fi

      - name: Notify if failed
        if: failure()
        run: |
          echo "❌ Smoke test failed!"
          echo "Check the deployment at: https://github.com/Heather-Bell-Hughes/gregs-word-game/actions"