name: Smoke Test

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

jobs:
  smoke-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Wait for GitHub Pages propagation
        run: sleep 30

      - name: Check site is accessible
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://heather-bell-hughes.github.io/gregs-word-game/)
          if [ "$response" != "200" ]; then
            echo "Site returned HTTP $response"
            exit 1
          fi
          echo "Site is accessible (HTTP $response)"

      - name: Verify SPA fallback exists
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://heather-bell-hughes.github.io/gregs-word-game/404.html)
          if [ "$response" != "200" ]; then
            echo "404.html returned HTTP $response — puzzle deep links will fail"
            exit 1
          fi
          echo "404.html is present (HTTP $response)"

      - name: Run production Playwright smoke tests
        run: npm run test:production
