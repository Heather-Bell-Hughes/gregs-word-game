name: Smoke Test

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

jobs:
  smoke-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages propagation
        run: |
          SITE="https://heather-bell-hughes.github.io/AlphaDelta"
          for i in $(seq 1 18); do
            code=$(curl -s -o /tmp/page.html -w "%{http_code}" "$SITE/")
            fallback=$(curl -s -o /dev/null -w "%{http_code}" "$SITE/404.html")
            if [ "$code" = "200" ] && [ "$fallback" = "200" ] && grep -q 'id="root"' /tmp/page.html; then
              echo "Site ready after attempt $i (HTTP $code, 404.html $fallback)"
              exit 0
            fi
            echo "Attempt $i: page=$code fallback=$fallback — waiting 10s..."
            sleep 10
          done
          echo "Site did not become ready within 3 minutes"
          exit 1

      - name: Run production Playwright smoke tests
        run: npm run test:production
