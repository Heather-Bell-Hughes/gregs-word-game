name: Import Puzzle Submissions

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:        # also triggerable manually from GitHub Actions tab

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Import new puzzles from Google Sheet
        run: node scripts/import-puzzles.js

      - name: Commit and push if puzzles changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/puzzles.json
          git diff --staged --quiet && echo "committed=false" >> $GITHUB_OUTPUT && exit 0
          git commit -m "Add new puzzle submissions from form"
          git pull --rebase origin main
          git push
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Trigger deploy
        if: steps.commit.outputs.committed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
